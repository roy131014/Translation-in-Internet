<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>번역기</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    textarea {
      width: 100%;
      height: 100px;
      margin-bottom: 10px;
      font-size: 16px;
    }
    #output {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #ccc;
      min-height: 50px;
      background: #f9f9f9;
    }
  </style>
</head>
<body>

<h2>번역기</h2>

<textarea id="inputText" placeholder="번역할 텍스트 입력..."></textarea>
<button onclick="translateText()">번역하기</button>

<h3>번역 결과</h3>
<div id="output"></div>
<small>영어➡️한국어 번역만 지원합니다.</small>
<script>
async function translateText() {
  const text = document.getElementById("inputText").value;

  if (!text) {
    alert("텍스트를 입력하세요!");
    return;
  }

  try {
    // 무료 비공식 엔드포인트 (학습/테스트용)
    const response = await fetch(
      "https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ko&dt=t&q=" 
      + encodeURIComponent(text)
    );

    const data = await response.json();

    let translated = "";
    data[0].forEach(item => {
      translated += item[0];
    });

    document.getElementById("output").innerText = translated;

  } catch (error) {
    console.error(error);
    alert("번역 중 오류 발생!");
  }
}
</script>

</body>
</html>
